<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Administration - Validation</title>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Camp 2026">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; padding: 20px; }
        .preuve-card { background: #333; padding: 20px; margin-bottom: 20px; border-radius: 8px; border-left: 5px solid #ffb703; }
        .info-header { font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; }
        .camp-name { color: #ffb703; }
        .defi-name { color: #00ffcc; }
        img { max-width: 300px; display: block; margin: 15px 0; border-radius: 4px; border: 1px solid #555; }
        .link-pre { color: #ffffff; text-decoration: underline; display: block; margin-bottom: 15px; }
        .actions { display: flex; gap: 10px; }
        button { border: none; padding: 12px 25px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 1rem; color: white; }
        button.valider { background: #10b981; }
        button.valider:hover { background: #059669; }
        button.refuser { background: #ff3366; }
        button.refuser:hover { background: #d62952; }
    </style>
</head>
<body>
    <h1>📋 Validation des preuves</h1>
    <div id="listePreuves">Chargement...</div>

    <script>
        const monClientSupabaseDefis = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function chargerPreuves() {
            // 1. Récupérer les preuves en attente
            const { data: reussites, error: errR } = await monClientSupabaseDefis
                .from('reussites')
                .select('*')
                .is('valide', null)

            if (errR) { 
                document.getElementById('listePreuves').innerHTML = "Erreur : " + errR.message;
                return; 
            }
            
            if (!reussites || reussites.length === 0) {
                document.getElementById('listePreuves').innerHTML = "Tout est validé ! 🎉";
                return;
            }

            // 2. Récupérer les infos des camps et défis pour affichage
            const { data: camps } = await monClientSupabaseDefis.from('camps').select('id, nom');
            const { data: defis } = await monClientSupabaseDefis.from('defis').select('id, nom');

            const container = document.getElementById('listePreuves');
            container.innerHTML = "";

            reussites.forEach(p => {
                const camp = camps ? camps.find(c => c.id === p.camp_id) : null;
                const defi = defis ? defis.find(d => d.id === p.defi_id) : null;
                
                const campNom = camp ? camp.nom : "Camp inconnu";
                const defiNom = defi ? defi.nom : "Défi inconnu";
                
                const div = document.createElement('div');
                div.className = 'preuve-card';
                div.innerHTML = `
                    <div class="info-header">
                        <span class="camp-name">${campNom}</span> | <span class="defi-name">${defiNom}</span>
                    </div>
                    <a href="${p.url_preuve}" target="_blank" class="link-pre">🔗 Voir le fichier original</a>
                    <img src="${p.url_preuve}" alt="Preuve">
                    <div class="actions">
                        <button class="valider" onclick="valider(${p.id})">✅ Valider</button>
                        <button class="refuser" onclick="refuser(${p.id})">❌ Refuser</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function valider(id) {
            const { error } = await monClientSupabaseDefis
                .from('reussites')
                .update({ valide: true })
                .eq('id', id);

            if (!error) { 
                alert("Défi validé !");
                chargerPreuves(); 
            } else { 
                alert("Erreur lors de la validation : " + error.message); 
            }
        }

        async function refuser(id) {
    // Demander le motif du refus
    const commentaire = prompt("Pourquoi refuses-tu ce défi ? (Le message sera envoyé à l'équipe)");
    
    // Si l'arbitre clique sur "Annuler", on arrête tout
    if (commentaire === null) return; 

    // On met à jour le commentaire AVANT de supprimer ou de marquer comme refusé
    // Ici, je propose une approche : au lieu de supprimer, on ajoute une colonne 'statut' 
    // ou on stocke le commentaire dans une ligne marquée 'refusee = true'
    const { error } = await monClientSupabaseDefis
        .from('reussites')
        .update({ 
            valide: false, 
            commentaire: commentaire || "Aucun commentaire." 
        })
        .eq('id', id);

    if (!error) { 
        alert("Défi marqué comme refusé avec le commentaire.");
        chargerPreuves(); 
    } else { 
        alert("Erreur : " + error.message); 
    }
}

        window.onload = chargerPreuves;
    </script>
</body>
</html>
